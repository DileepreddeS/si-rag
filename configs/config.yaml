project:
  name: "SI-RAG"
  version: "1.0.0"

llm:
  provider: "ollama"
  model: "qwen2.5:7b"
  base_url: "http://localhost:11434"
  temperature: 0.1
  max_tokens: 200

retrieval:
  embedding_model: "BAAI/bge-small-en-v1.5"
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_retrieval: 20
  top_k_rerank: 5
  bm25_weight: 0.4
  faiss_weight: 0.6
  index_path: "data/indexes/faiss.index"
  bm25_path: "data/indexes/bm25.pkl"
  corpus_path: "data/raw/corpus.jsonl"

critic:
  nli_model: "cross-encoder/nli-deberta-v3-small"
  confidence_threshold: 0.35
  max_retries: 2

si_layer:
  enable_prompt_optimization: true
  enable_cot: true
  retry_strategies:
    - "REWRITE_QUERY"
    - "EXPAND_CONTEXT"
    - "DECOMPOSE"

debug:
  enabled: true
  show_retrieved_docs: true
  show_confidence: true
  show_retry_trace: true
  log_path: "data/failure_log.jsonl"

eval:
  dataset: "natural_questions"
  metrics:
    - "faithfulness"
    - "answer_relevancy"
    - "context_precision"